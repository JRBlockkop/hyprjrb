<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyprJRB</title>
    <style>
        body{
            margin: 0;
        }
        #window-bar{
            height: 26px;
            background-color: gray;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }
        #x{
            width: 20px;
            height: 20px;

            background-color: red;
            color: black;

            font-family: system-ui;
            user-select: none;

            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            margin-right: 3px;
        }
    </style>
</head>
<body>
    <div id="window-bar"><span></span><div id="x">X</div></div>
    <canvas></canvas>
    <script>
        const EventMap = new Map(
            [
                ["CreateWindowAndRenderer",(s)=>{SDL.window.title = s.split('|')[2];SDL.window.resize(s.split('|')[0],s.split('|')[1]);}],
                ["SetWindowTitle",(s)=>{SDL.window.title = s.split('|')[0];span.innerText = SDL.window.title}],
                ["SetRenderDrawColor",(s)=>{SDL.color.set(s.split('|')[0],s.split('|')[1],s.split('|')[2],s.split('|')[3])}],
                ["RenderClear",(s)=>{ctx.fillStyle = `rgba(${SDL.color.r},${SDL.color.g},${SDL.color.b},${SDL.color.a})`;ctx.fillRect(0,0,SDL.window.w,SDL.window.h)}],
                ["StartTextInput",()=>{}],
                ["StopTextInput",()=>{}],
                ["RenderPresent",()=>{}],
                ["RenderTexture",(s)=>{ctx.font = "30px Arial";ctx.fillStyle = `rgba(${s.split('|')[4]},${s.split('|')[5]},${s.split('|')[6]},${s.split('|')[7]})`;ctx.fillText(s.split('|').slice(8).join("|"), s.split('|')[2], 3+s.split('|')[3]);}],
                ["RenderFillRect",(s)=>{ctx.fillStyle = `rgba(${SDL.color.r},${SDL.color.g},${SDL.color.b},${SDL.color.a})`;ctx.fillRect(s.split('|')[0],s.split('|')[1],s.split('|')[2],s.split('|')[3])}],
                ["DestroyWindow",()=>{SDL.window.title = "";SDL.window.resize(0,0)}],
                ["Delay",()=>{if(SDL.stack.length > 0){ws.send(SDL.stack.pop())}}],
            ]
        )
    </script>
    <script>
        const canvas = document.querySelector('canvas');
        const div = document.getElementById('window-bar');
        const x = document.getElementById('x');
        const span = document.querySelector('span');
        const ws = new WebSocket("http://localhost:53747");

        const ctx = canvas.getContext("2d");

        const SDL = {
            stack: [],
            color: {
                r: 0,
                g: 0,
                b: 0,
                a: 0,
                set(r,g,b,a){
                    SDL.color.r = r;
                    SDL.color.g = g;
                    SDL.color.b = b;
                    SDL.color.a = a;
                }
            },
            window: {
                w: 100,
                h: 100,
                title: "",
                resize(w,h){
                    SDL.window.w = w;
                    SDL.window.h = h;

                    span.innerText = SDL.window.title;
                    div.style.width = `${w}px`;

                    canvas.height = h;
                    canvas.width = w;
                }
            }
        }

        SDL.window.resize(100,100)

        ws.onmessage = (msg)=>{
            try{
                if(msg.data.split("|").length > 1){
                    EventMap.get(msg.data.split("|")[0])(msg.data.split("|").slice(1).join("|"))
                }else{
                    EventMap.get(msg.data.split("|")[0])()
                }
            }catch(e){console.log("Error:",e,msg)}
            
        }

        //Listeners
        x.addEventListener('click',(e)=>{
            SDL.stack.push('SDL_EVENT_QUIT')
        })
        canvas.addEventListener("mousedown", (event) => {
            let button;

            switch (event.button) {
                case 0:
                    button = "SDL_BUTTON_LEFT";
                    break;
                case 1:
                    button = "SDL_BUTTON_MIDDLE";
                    break;
                case 2:
                    button = "SDL_BUTTON_RIGHT";
                    break;
                default:
                    return;
            }
            const rect = canvas.getBoundingClientRect();

            const x = Math.floor(event.clientX - rect.left);
            const y = Math.floor(event.clientY - rect.top);

            SDL.stack.push(`SDL_EVENT_MOUSE_BUTTON_DOWN|${button}|${x}|${y}`);
        });
        document.body.addEventListener("keydown", (event) => {
            if(event.key.length==1){
                SDL.stack.push(`SDL_EVENT_TEXT_INPUT|${event.key}`);
            }else{
                SDL.stack.push(`SDL_EVENT_KEY_DOWN|${event.key}`);
            }
        })
    </script>
</body>
</html>
